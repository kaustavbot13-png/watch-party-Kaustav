<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>watch party Kaustav TV</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>watch party Kaustav T<span id="secret-login-trigger" style="cursor: pointer;">V</span></h1>

        <div id="admin-login-section" class="hidden">
            <input type="password" id="admin-password" placeholder="Admin Password">
            <button id="login-btn">Login as Admin</button>
            <p id="login-error" class="error"></p>
        </div>

        <div id="admin-controls" class="hidden">
            <h3>Admin Controls</h3>
            <div id="playlist-container">
                <div class="playlist-item">
                    <div class="control-group">
                        <input type="text" class="video-url" placeholder="Direct Video URL (e.g., .mp4, .webm)">
                        <button class="load-video-btn">Load</button>
                        <button class="remove-link-btn" style="background-color: #ff5252;">Remove</button>
                    </div>
                    <div class="control-group track-selection-group hidden" style="margin-top: 10px;">
                        <select class="audio-track-selector">
                            <option value="0">Default Track</option>
                        </select>
                        <button class="run-video-btn">Run</button>
                    </div>
                </div>
            </div>
            <button id="add-link-btn" style="margin-top: 15px;">+ Add Link</button>
            <button id="submit-playlist-btn" style="margin-top: 15px; margin-left: 10px; background-color: #2196F3;">Submit Playlist</button>
            <button id="full-refresh-btn" style="margin-top: 15px; margin-left: 10px; background-color: #f44336;">Full Server Refresh</button>
            <p>You have control over the player. Actions will sync to all users.</p>
        </div>

        <div class="player-container">
            <div id="no-signal-screen" class="no-signal">NO SIGNAL</div>
            <div id="watermark" class="watermark hidden">Kaustav TV &copy;</div>
            <video id="video-player" controls preload="auto">
                Your browser does not support the video tag.
            </video>
            <!-- Overlay to block non-admin interaction -->
            <div id="player-overlay" class="overlay"></div>
        </div>

        <div class="status">
            <span id="role-status">Viewing as: Guest</span>
            <button id="guest-play-btn" class="hidden" style="margin-left: 10px; padding: 5px 10px; font-size: 0.9em; background-color: #ff9800;">Play</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
